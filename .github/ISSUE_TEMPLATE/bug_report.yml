name: Bug report
description: Report a problem with the Blender add-on, MCP server, or VS Code extension.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in as much as you can.

        For **security issues**, do not file a public bug — see [SECURITY.md](../../SECURITY.md).
  - type: input
    id: component
    attributes:
      label: Component
      description: Which part is affected? (add-on, mcp_server, vscode_extension, docs)
      placeholder: mcp_server
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal repro — commands, prompts, or scene setup.
      placeholder: |
        1. Start Blender + add-on
        2. Run `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: blender-version
    attributes:
      label: Blender version
      placeholder: "4.2.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: addon-version
    attributes:
      label: Add-on / server / extension versions
      placeholder: "addon 1.2.0, server 1.2.2, extension 1.2.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. **Redact tokens and any sensitive paths.**
      render: shell
