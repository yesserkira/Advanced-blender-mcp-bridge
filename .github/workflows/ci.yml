name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        working-directory: mcp_server
        run: uv sync --all-extras
      - name: Lint
        working-directory: mcp_server
        run: uv run ruff check blender_mcp tests
      - name: Type check
        working-directory: mcp_server
        run: uv run mypy blender_mcp --ignore-missing-imports
      - name: Test
        working-directory: mcp_server
        run: uv run pytest -q --tb=short

  addon-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint add-on
        run: ruff check blender_addon --ignore E402

  extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: vscode_extension
        run: npm ci
      - name: Compile
        working-directory: vscode_extension
        run: npm run compile

  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate schemas
        run: |
          python -c "
          import json, jsonschema, glob
          for f in glob.glob('shared/schemas/*.schema.json'):
              with open(f) as fh:
                  schema = json.load(fh)
              jsonschema.Draft7Validator.check_schema(schema)
              print(f'  ✓ {f}')
          "

  blender-integration:
    # Headless Blender exercises real bpy ops (capabilities/composer/snapshot/
    # geonodes). The fake-WS suite already covers every MCP wrapper; this job
    # verifies the add-on side actually runs against Blender's API.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        blender-version: ["4.2.0", "4.3.0"]
    env:
      BLENDER_VERSION: ${{ matrix.blender-version }}
      BLENDER_MAJOR: ${{ startsWith(matrix.blender-version, '4.2') && '4.2' || '4.3' }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Blender
        id: blender-cache
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ matrix.blender-version }}-linux-x64

      - name: Download Blender
        if: steps.blender-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          mkdir -p ~/blender
          URL="https://download.blender.org/release/Blender${BLENDER_MAJOR}/blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          curl -fSL "$URL" -o /tmp/blender.tar.xz
          tar -xJf /tmp/blender.tar.xz -C ~/blender --strip-components=1
          rm /tmp/blender.tar.xz

      - name: Install pytest into Blender's bundled Python
        run: |
          set -euxo pipefail
          BPY=$(find ~/blender -type f -name 'python3*' -path '*/bin/*' | head -n 1)
          echo "Bundled python: $BPY"
          "$BPY" -m ensurepip --upgrade
          "$BPY" -m pip install --upgrade pip
          "$BPY" -m pip install pytest

      - name: Run headless integration tests
        run: |
          set -euxo pipefail
          ~/blender/blender --background --factory-startup \
            --python tests/integration/run_in_blender.py

