name: extension-ci

on:
  push:
    branches: [main]
    paths:
      - 'vscode_extension/**'
      - '.github/workflows/extension-ci.yml'
  pull_request:
    paths:
      - 'vscode_extension/**'
      - '.github/workflows/extension-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode_extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vscode_extension/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run bundle
      - run: npm test
